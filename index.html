<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Dulce Abrazo y Tres Besitos</title>
    <style>
        :root {
            --rosa: #f3d1d1;
            --marron: #6d4c41;
            --fondo: #fffafa;
        }

        body { font-family: 'Arial', sans-serif; margin: 0; background: var(--fondo); color: var(--marron); text-align: center; }
        
        header { background: white; padding: 30px; border-bottom: 5px solid var(--rosa); }
        h1 { margin: 0; font-size: 1.8rem; }

        nav { background: white; padding: 15px; position: sticky; top: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        nav a { text-decoration: none; color: var(--marron); font-weight: bold; margin: 0 15px; cursor: pointer; }
        nav a:hover { color: #ff8a80; }

        
        .seccion { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .activa { display: block; } 

        /* Estilo Fotos */
        .grid-fotos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .foto-item { background: white; border: 2px solid var(--rosa); border-radius: 15px; overflow: hidden; }
        .foto-item img { width: 100%; height: 300px; object-fit: cover; }

        /* Estilo Tabla Precios */
        table { width: 100%; max-width: 500px; margin: 20px auto; border-collapse: collapse; background: white; }
        th, td { padding: 15px; border: 1px solid var(--rosa); text-align: left; }
        th { background: var(--rosa); }
    </style>
</head>
<body>

    <header>
        <h1>🧁 Un Dulce Abrazo y Tres Besitos</h1>
        <p>"Sabor casero hecho con amor"</p>
    </header>

    <nav>
        
        <a onclick="mostrar('inicio')">INICIO</a>
        <a onclick="mostrar('precios')">PRECIOS</a>
        <a href="https://wa.me" target="_blank">PEDIR</a>
    </nav>

    <!-- SECCIÓN 1: FOTOS -->
    <div id="inicio" class="seccion activa">
        <h2>Nuestras Creaciones</h2>
        <div class="grid-fotos">
            <div class="foto-item"><img src="foto1.jpg"><div style="padding:10px">Mis Tortas</div></div>
            <div class="foto-item"><img src="foto2.jpg"><div style="padding:10px">Pastelería</div></div>
            <div class="foto-item"><img src="foto3.jpg"><div style="padding:10px">Especialidades</div></div>
        </div>
    </div>

    <!-- SECCIÓN 2: PRECIOS -->
    <div id="precios" class="seccion">
        <h2>Lista de Precios</h2>
        <table>
            <tr><th>Producto</th><th>Precio</th></tr>
            <tr><td>Torta personalizada</td><td>Desde $15.000</td></tr>
            <tr><td>Kuchen de nuez</td><td>$8.500</td></tr>
            <tr><td>Docena pan amasado</td><td>$4.000</td></tr>
        </table>
    </div>

    <script>
        function mostrar(idSeccion) {
            
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));

            document.getElementById(idSeccion).classList.add('activa');
        }
    </script>

</body>
</html>
